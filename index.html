<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GameGeek</title>

  <link rel="stylesheet" href="gamegeek.css" />
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">

  <style>
    #slot-center { position: relative; }

    /* 新增：包住遊戲 + overlay 的容器 */
    #game-wrapper {
      position: relative;
      display: inline-block; /* 寬高跟著 iframe 走 */
    }

    /* 疊在 iframe 上的終端機輸出層（不擋操作） */
    #terminal {
      position: absolute;
      inset: 0;
      padding: 8px 10px;
      background: transparent;

      color: #00ff66;
      font-family: "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.4;

      pointer-events: none; /* 不擋 iframe / launcher / settings */
      z-index: 10;
      overflow-y: hidden;
    }

    /* ✅ terminal 預設隱藏：由 develop mode 控制 */
    #terminal.hidden { display: none !important; }

    /* 覆蓋式載入介面（會擋住中間正方形區域） */
    #launcher {
      position: absolute;
      inset: 0;
      background: #f0f0f0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      pointer-events: auto;
    }

    /* ✅ 覆蓋式設定介面（同 launcher 風格） */
    #settings-panel{
      position: absolute;
      inset: 0;
      background: #f0f0f0;
      z-index: 21; /* 比 launcher 高一點，避免同時開時疊錯 */
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      pointer-events: auto;
    }

    .hidden { display: none !important; }

    .launcher-topbar,
    .settings-topbar{
      display:flex;
      gap: 8px;
      align-items:center;
    }

    #game-url{
      flex: 1 1 auto;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #load-btn, #close-btn,
    #settings-close-btn{
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
    }

    /* ✅ SS 主頁 iframe 容器 */
    .launcher-body{
      flex: 1 1 auto;
      min-height: 0;            /* 讓 iframe 能在 flex 裡正確縮放 */
      border: 1px solid #cfcfcf;
      border-radius: 10px;
      overflow: hidden;
      background: #f0f0f0;
    }
    #ss-home{
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f0f0f0;
    }

    /* launcher/設定面板底部提示 */
    .launcher-footnote,
    .settings-footnote{
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    /* ✅ Settings 內容區 */
    .settings-body{
      background: #ffffff;
      border: 1px solid #cfcfcf;
      border-radius: 10px;
      padding: 12px;
    }
    .settings-row{
      display:flex;
      align-items:center;
      gap: 10px;
      font-size: 14px;
      color: #222;
    }
    .settings-row input[type="checkbox"]{
      width: 18px;
      height: 18px;
    }
  </style>
</head>

<body class="landscape">
<div id="shell">
  <div id="slot-left"></div>

  <div id="slot-center">
    <div id="game-wrapper">
      <iframe id="game" src="https://strategy-space.vercel.app/voxel/santa-gifts/index.html" frameborder="0" scrolling="no" allowfullscreen></iframe>

      <!-- 終端機：顯示按鈕事件（預設隱藏） -->
      <div id="terminal" class="hidden" aria-hidden="true"></div>

      <!-- 覆蓋層：輸入網址 + 載入 + SS 主頁 -->
      <div id="launcher" class="hidden" aria-hidden="true">
        <div class="launcher-topbar">
          <input id="game-url" type="text" placeholder="貼上遊戲網址（建議含 /index.html）" />
          <button id="load-btn" class="gbtn">載入</button>
          <button id="close-btn" class="gbtn">✕</button>
        </div>

        <!-- ✅ 原 launcher-hint 改成 iframe：固定放 SS 主頁 -->
        <div class="launcher-body">
          <iframe id="ss-home"
                  src="https://strategy-space.vercel.app/index.html"
                  title="StrategySpace Home"></iframe>
        </div>

        <div class="launcher-footnote">
          點 SS 的 Play 會把網址送回這裡，然後你再按「載入」確定進入遊戲。
        </div>
      </div>

      <!-- ✅ 覆蓋層：Settings -->
      <div id="settings-panel" class="hidden" aria-hidden="true">
        <div class="settings-topbar">
          <div style="flex:1 1 auto; font-weight:700; color:#333;">Settings</div>
          <button id="settings-close-btn" class="gbtn">✕</button>
        </div>

        <div class="settings-body">
          <label class="settings-row">
            <input id="dev-toggle" type="checkbox" />
            <span>Develop mode（顯示 terminal）</span>
          </label>
        </div>

        <div class="settings-footnote">
          勾選後才會顯示綠色 terminal。之後更多 GG 設定項會加在這裡。
        </div>
      </div>

    </div>
  </div>

  <div id="slot-right"></div>
  <div id="slot-bottom"></div>
</div>

<!-- LeafLune Panel（logo + D-Pad） -->
<section id="panel-leaf" class="panel">
  <div class="brand">
    <img src="leaflune_emoji.png" alt="LeafLune logo">
    <span>LeafLune</span>
  </div>

  <div class="joystick control-block" id="joystick">
    <div class="joystick-base" id="joystick-base">
      <div class="joystick-knob" id="joystick-knob"></div>
    </div>
  </div>

  <div class="panel-foot">
    <button class="gbtn utility-btn" title="Start">▷</button>
    <!-- 這顆用來打開覆蓋層（SS launcher） -->
    <button id="menu-btn" class="gbtn utility-btn" title="Select">☰</button>
  </div>
</section>

<!-- GameGeek Panel（文字 + 1~4 + 全螢幕） -->
<section id="panel-geek" class="panel">
  <div class="brand">
    <span>GameGeek</span>
    <span aria-hidden="true">🎮</span>
  </div>

  <div class="actions control-block">
    <button class="gbtn" data-key="btn1" style="grid-area: btn1;">1</button>
    <button class="gbtn" data-key="btn2" style="grid-area: btn2;">2</button>
    <button class="gbtn" data-key="btn3" style="grid-area: btn3;">3</button>
    <button class="gbtn" data-key="btn4" style="grid-area: btn4;">4</button>
  </div>

  <div class="panel-foot">
    <!-- ✅ 改成有 id：用來打開 settings -->
    <button id="settings-btn" class="gbtn utility-btn" title="Set">⚙</button>
    <button id="fullscreen-btn" class="gbtn utility-btn" title="全螢幕">⛶</button>
  </div>
</section>

<script src="gg_rwd.js"></script>

<script>
  const fsBtn       = document.getElementById('fullscreen-btn');
  const menuBtn     = document.getElementById('menu-btn');
  const settingsBtn = document.getElementById('settings-btn');

  const gameFrame = document.getElementById('game');
  const terminal  = document.getElementById('terminal');

  const launcher  = document.getElementById('launcher');
  const urlInput  = document.getElementById('game-url');
  const loadBtn   = document.getElementById('load-btn');
  const closeBtn  = document.getElementById('close-btn');

  const settingsPanel = document.getElementById('settings-panel');
  const settingsClose = document.getElementById('settings-close-btn');
  const devToggle     = document.getElementById('dev-toggle');

  // ==============================
  // ✅ 支援 ?game=<game_url>
  // 例：
  //   /?game=https%3A%2F%2Fstrategy-space.vercel.app%2Femoji%2Fslot.html
  // ==============================

  const DEFAULT_GAME_URL = gameFrame.src; // 沒帶 ?game 時維持原本 iframe src

  function getGameFromQuery() {
    const qs = new URLSearchParams(window.location.search);
    let raw = qs.get('game');
    if (!raw) return '';

    // 支援已 encode / 未 encode
    try { raw = decodeURIComponent(raw); } catch (e) {}

    return raw.trim();
  }

  function bootLoadGameFromQuery() {
    const q = getGameFromQuery();
    if (!q) return; // 沒帶 game 參數就不動

    const u = normalizeUrl(q);
    if (!u) return;

    gameFrame.src = u;

    // 讓 launcher 預填也一致（可選但很順）
    urlInput.value = u;

    printTerminal(`loaded(query): ${u}`, true);
    setDevelopMode(devToggle.checked, false);
  }


  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  }
  fsBtn.addEventListener('click', toggleFullscreen);

  layout(); // 你原本的 responsive/置中 sizing 邏輯

   bootLoadGameFromQuery();

  // ====== Terminal ======
  function nowStamp() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    const ss = String(d.getSeconds()).padStart(2, '0');
    const ms = String(d.getMilliseconds()).padStart(3, '0');
    return `${hh}:${mm}:${ss}.${ms}`;
  }

  function printTerminal(text, showTime = true) {
    // ✅ 若 terminal 隱藏，仍可保留 log（只是不顯示）
    // 若你想完全不記錄，可改成：if (terminal.classList.contains('hidden')) return;
    if (!terminal) return;
    const line = document.createElement('div');
    line.textContent = showTime ? `[${nowStamp()}] ${text}` : `${text}`;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
  }

  function ggEventText(player, btnID, state) {
    return `{ id:${btnID}, s:"${state}" }`;
  }

  // ====== GG btnID 固定表（v1.0）=====
  // 0: none
  // 1~4: 功能鍵
  // 5~8: 上左下右（WASD / IJKL）
  const btnIDMap = {
    btn1: 1, btn2: 2, btn3: 3, btn4: 4,
    up: 5, left: 6, down: 7, right: 8
  };

  function sendGGEvent(player, btnID, state) {
    if (!gameFrame || !gameFrame.contentWindow) return;
    gameFrame.contentWindow.postMessage(
            { type: "gg_event", player, btnID, state },
            "*"
    );
  }

  // ====== Launcher ======
  function showLauncher() {
    // 互斥：開 launcher 就關 settings
    hideSettings();

    launcher.classList.remove('hidden');
    launcher.setAttribute('aria-hidden', 'false');
    // 預填目前 src（方便你改）
    urlInput.value = gameFrame.src || '';
    setTimeout(() => urlInput.focus(), 0);
  }

  function hideLauncher() {
    launcher.classList.add('hidden');
    launcher.setAttribute('aria-hidden', 'true');
  }

  function normalizeUrl(u) {
    u = (u || '').trim();
    if (!u) return '';
    if (u.endsWith('.html')) return u;
    if (u.endsWith('/')) return u + 'index.html';
    return u + '/index.html';
  }

  function loadGameUrl() {
    const u = normalizeUrl(urlInput.value);
    if (!u) return;

    gameFrame.src = u;

    // ✅（可選）同步到網址列，方便分享 / 塞 LIFF Endpoint
    const encoded = encodeURIComponent(u);
    const newUrl = `${location.pathname}?game=${encoded}`;
    history.replaceState(null, "", newUrl);

    hideLauncher();
    printTerminal(`loaded: ${u}`, true);
    setDevelopMode(devToggle.checked, false);
  }

  menuBtn.addEventListener('click', () => {
    if (launcher.classList.contains('hidden')) showLauncher();
    else hideLauncher();
  });

  closeBtn.addEventListener('click', hideLauncher);
  loadBtn.addEventListener('click', loadGameUrl);

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadGameUrl();
    if (e.key === 'Escape') hideLauncher();
  });

  // ✅ 接收 SS 主頁的選擇：只寫入網址列，不自動載入
  const ALLOWED_SS_ORIGIN = "https://strategy-space.vercel.app";

  window.addEventListener("message", (ev) => {
    const d = ev.data;
    if (!d || typeof d !== "object") return;

    // 只接受 SS 來源（避免亂塞）
    if (ev.origin !== ALLOWED_SS_ORIGIN) return;

    if (d.type === "ss_open" && typeof d.url === "string") {
      const u = normalizeUrl(d.url);
      urlInput.value = u;

      // 若 launcher 沒打開，幫你打開（你才看得到網址列已被填入）
      if (launcher.classList.contains("hidden")) showLauncher();

      printTerminal(`SS selected: ${u} (waiting for load)`, true);
    }
  });

  // ====== Settings (Develop Mode) ======
  function showSettings(){
    // 互斥：開 settings 就關 launcher
    hideLauncher();

    settingsPanel.classList.remove('hidden');
    settingsPanel.setAttribute('aria-hidden', 'false');
  }
  function hideSettings(){
    settingsPanel.classList.add('hidden');
    settingsPanel.setAttribute('aria-hidden', 'true');
  }

  function setDevelopMode(on, save = true){
    if (on) terminal.classList.remove('hidden');
    else terminal.classList.add('hidden');

    if (save) localStorage.setItem('gg_develop_mode', on ? '1' : '0');
  }

  // 初始：讀 localStorage（預設關）
  (function initDevelopMode(){
    const saved = localStorage.getItem('gg_develop_mode');
    const on = saved === '1';
    devToggle.checked = on;
    setDevelopMode(on, false);
  })();

  settingsBtn.addEventListener('click', () => {
    if (settingsPanel.classList.contains('hidden')) showSettings();
    else hideSettings();
  });
  settingsClose.addEventListener('click', hideSettings);

  devToggle.addEventListener('change', () => {
    setDevelopMode(devToggle.checked, true);
  });

  // ====== 綁定所有 data-key 按鈕：印出 + 送出 gg_event ======
  const padButtons = document.querySelectorAll('button[data-key]');
  const currentPlayer = 0;

  padButtons.forEach(btn => {
    const key = btn.dataset.key;
    const btnID = btnIDMap[key] ?? 0;

    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      // setPointerCapture 失敗不該擋住事件送出(多指同時按時較容易踩到邊界情況)
      try { if (btn.setPointerCapture) btn.setPointerCapture(e.pointerId); } catch (err) {}
      btn.classList.add('pressed'); // 手動控制按下視覺，不依賴瀏覽器 :active(多點觸控時不可靠)

      printTerminal(ggEventText(currentPlayer, btnID, "down"), false);
      sendGGEvent(currentPlayer, btnID, "down");
    });

    const end = (e) => {
      e.preventDefault();
      try { if (btn.releasePointerCapture) btn.releasePointerCapture(e.pointerId); } catch (err) {}
      btn.classList.remove('pressed');

      printTerminal(ggEventText(currentPlayer, btnID, "up"), false);
      sendGGEvent(currentPlayer, btnID, "up");
    };

    btn.addEventListener('pointerup', end);
    btn.addEventListener('pointercancel', end);
  });

  // ====== 虛擬搖桿（取代原本4顆方向鍵；輸出仍是離散 gg_event，8方向量化+死區，協定不變） ======
  (function () {
    const base = document.getElementById('joystick-base');
    const knob = document.getElementById('joystick-knob');
    if (!base || !knob) return;

    const DIR_BTN = { up: 5, left: 6, down: 7, right: 8 };
    // 維持 4 方向、不做斜角組合鍵（每個扇區 90 度，取最近的單一方向）
    const SECTORS = [
      { angle: 0,    dirs: ['right'] },
      { angle: 90,   dirs: ['up'] },
      { angle: 180,  dirs: ['left'] },
      { angle: -90,  dirs: ['down'] },
    ];
    const DEADZONE_RATIO = 0.25; // 位移小於半徑 25% 視為回中，不觸發方向

    let active = new Set(); // 目前按住的方向名稱

    function applyActive(newActive) {
      for (const d of active) {
        if (!newActive.has(d)) {
          printTerminal(ggEventText(currentPlayer, DIR_BTN[d], "up"), false);
          sendGGEvent(currentPlayer, DIR_BTN[d], "up");
        }
      }
      for (const d of newActive) {
        if (!active.has(d)) {
          printTerminal(ggEventText(currentPlayer, DIR_BTN[d], "down"), false);
          sendGGEvent(currentPlayer, DIR_BTN[d], "down");
        }
      }
      active = newActive;
    }

    function nearestSector(deg) {
      let best = SECTORS[0], bestDiff = Infinity;
      for (const s of SECTORS) {
        const diff = Math.abs(((deg - s.angle + 540) % 360) - 180);
        if (diff < bestDiff) { bestDiff = diff; best = s; }
      }
      return best;
    }

    function updateFromPointer(clientX, clientY) {
      const rect = base.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      const radius = rect.width / 2;
      const maxKnobOffset = radius - 26; // 26 ≈ knob半徑，避免視覺溢出base

      if (dist < radius * DEADZONE_RATIO) {
        knob.style.transform = `translate(-50%, -50%)`;
        applyActive(new Set());
        return;
      }
      const clamped = Math.min(dist, maxKnobOffset);
      const ux = dx / dist, uy = dy / dist;
      knob.style.transform = `translate(calc(-50% + ${ux * clamped}px), calc(-50% + ${uy * clamped}px))`;

      const deg = Math.atan2(-dy, dx) * 180 / Math.PI; // 數學角度、上=+90
      applyActive(new Set(nearestSector(deg).dirs));
    }

    function end() {
      knob.classList.remove('active');
      knob.style.transform = `translate(-50%, -50%)`;
      applyActive(new Set());
    }

    base.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      knob.classList.add('active');
      try { base.setPointerCapture(e.pointerId); } catch (err) {}
      updateFromPointer(e.clientX, e.clientY);
    });
    base.addEventListener('pointermove', (e) => {
      e.preventDefault();
      updateFromPointer(e.clientX, e.clientY);
    });
    base.addEventListener('pointerup', end);
    base.addEventListener('pointercancel', end);
    window.addEventListener('blur', end);
  })();
</script>
</body>
</html>
